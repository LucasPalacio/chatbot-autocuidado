name: Validacao Continua (CI)

# Define quando a automação vai rodar (ao fazer push ou pull request)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  testes-e-lint:
    runs-on: ubuntu-latest # O servidor virtual que o GitHub vai usar

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11" # Pode ajustar se estiver usando outra versão

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Análise estática do código (Linting com Flake8)
      run: |
        # Configurado para não travar o build por bobeira, mas mostrar os erros
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Rodar Testes Automatizados (Pytest)
      run: pytest